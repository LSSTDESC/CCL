likelihood:
  ccl.joint:
    python_path: /n/home12/cgarciaquintero/cosmological_inference/cobaya/cobaya/likelihoods
    use_MG: True
    use_Weyl: True
    # Use hankel module for Bessel transforms. For checking.
    use_hankel: False
    # Approximate bessel integral as binned smooth C_L
    # against integrals of bessel in each bin.
    binned_bessels: False
    acc: 3

theory:
  cobaya_isitgr.isitgr.ISiTGR:
    path: /n/home12/cgarciaquintero/DESI/ISiTGR
    extra_args:
      MG_parameterization: muSigma
      NonLinear: False
      num_massive_neutrinos: 0
      #AccuracyBoost: 3.0
      #lAccuracyBoost: 3.0
      #lSampleBoost: 3.0
      
params:
  # ---- Modified Gravity (fixed) ----
  mu0: 0.1
  Sigma0: 0.1
  c1: 1.1
  c2: 1.1
  lambda_2: 1.0
  
  # ---- Cosmology (fixed) ----
  H0: 67.36
  omch2: 0.1200
  ombh2: 0.02237
  As: 2.100e-9
  ns: 0.9649
  mnu: 0.0
  nnu: 3.046
  omk: 0.0
  w: -1.0

  # ---- DES nuisance (fixed) ----

name: continuous-integration

on:
  push:
    branches:
      - master
      - releases/*
  pull_request: null
  workflow_dispatch:
    inputs:
      python-version:
        description: 'Python version to test (leave empty for all)'
        required: false
        type: string
      os:
        description: 'OS to test on'
        required: false
        type: choice
        options:
          - all
          - ubuntu-latest
          - macos-latest
        default: 'all'

# Cancel redundant builds
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CACHE_NUMBER: 0  # increase to reset cache manually
  CONDA_ENV: .github/environment.yml

jobs:
  build:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -l {0}

    permissions:
      contents: read
      checks: write

    strategy:
      fail-fast: false
      matrix:
        os: ${{ (github.event.inputs.os == 'all' || github.event.inputs.os == '') && fromJSON('["macos-latest", "ubuntu-latest"]') || fromJSON(format('["{0}"]', github.event.inputs.os)) }}
        python-version: ${{ github.event.inputs.python-version != '' && fromJSON(format('["{0}"]', github.event.inputs.python-version)) || fromJSON('["3.11", "3.12", "3.13", "3.14"]') }}
        include:
          - os: macos-latest
            label: osx-64
            prefix: /Users/runner/miniconda3

          - os: ubuntu-latest
            label: linux-64
            prefix: /usr/share/miniconda3

    steps:

      - name: Checkout CCL repository
        uses: actions/checkout@v4

      - name: Set up conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          channels: conda-forge
          show-channel-urls: true
          miniforge-version: latest
          miniforge-variant: Miniforge3
          python-version: ${{ matrix.python-version }}

      - name: "macOS: set env variables"
        if: matrix.label == 'osx-64'
        run: |
          echo "DYLD_FALLBACK_LIBRARY_PATH=${CONDA_PREFIX}/lib" >> $GITHUB_ENV
          SDKROOT=$(xcrun --sdk macosx --show-sdk-path)
          echo "SDKROOT: ${SDKROOT}"
          echo "SDKROOT=${SDKROOT}" >> $GITHUB_ENV
          echo "CONDA_BUILD_SYSROOT=${SDKROOT}" >> $GITHUB_ENV
          echo "CFLAGS=-I/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk/usr/include" >> $GITHUB_ENV
          echo "LDFLAGS=-L/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk/usr/lib" >> $GITHUB_ENV

      - name: Set current date as environment variable
        run: echo "TODAY=$(date +'%Y.%m.%d')" >> $GITHUB_ENV

      - name: Get cached environment
        uses: actions/cache@v4
        id: cache
        with:
          path: ${{ matrix.prefix }}
          key:
            conda-py${{ matrix.python-version }}-${{
            matrix.os }}--${{
            hashFiles(env.CONDA_ENV) }}-${{
            hashFiles('setup.py') }}--${{
            env.TODAY }}-${{
            env.CACHE_NUMBER }}

      - name: Install environment packages
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          export MAMBA_NO_BANNER=1  # hide mamba banner from output
          mamba env update --file ${{ env.CONDA_ENV }} --prune

      - name: Get pip cache dir
        id: pip-cache
        run: echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.pip-cache.outputs.dir }}
          key: pip-py${{ matrix.python-version }}-${{ runner.os }}-${{ hashFiles('**/environment.yml') }}-${{ hashFiles('setup.py') }}
          restore-keys: |
            pip-py${{ matrix.python-version }}-${{ runner.os }}-
            pip-${{ runner.os }}-

      - name: Install CCL
        run: pip install -v -e .

      - name: Full compilation (to run C-level benchmarks)
        run: |
          cmake -H. -Bbuild -DPYTHON_VERSION=0.0.0
          make -Cbuild all
          ./build/check_ccl

      - name: Unit tests
        run: |
          OMP_NUM_THREADS=2 pytest -vv pyccl --cov=pyccl --cov-report=lcov:lcov.info

      - name: Benchmarks
        run: |
          OMP_NUM_THREADS=2 pytest -vv benchmarks --cov=pyccl --cov-report=lcov:lcov.info --cov-append

      - name: Code coverage
        if: matrix.label == 'linux-64'
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: lcov.info

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout CCL repository
        uses: actions/checkout@v4

      - name: Lint
        uses: py-actions/flake8@v2
        with:
          args: "--config .flake8"
